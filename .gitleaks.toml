# 概要: team-dev-kit リポジトリ自身のスキャン設定(overlay)。kit が配る基盤ルール(framework/base)を
#       extend し、このリポジトリ固有の許可(テスト検体)だけを足す。kit は自分の仕組みを dogfood する。
# 注意: extend.path は CWD(repo ルート)基準。pre-commit は repo ルートで走るため解決する。
title = "team-dev-kit repo scan (overlay)"

[extend]
path = "plugins/team-dev-kit/framework/base.gitleaks.toml"

[allowlist]
description = "team-dev-kit repo 固有の許可"
regexTarget = "match"
paths = [
  # スモークの egress 検体。意図的に PII を含むためコミット走査から除外する。
  '''tests/fixtures/''',
]
